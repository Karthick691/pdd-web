<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FoodSnap AI</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }
        #compose-canvas {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            z-index: 1;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script type="application/javascript" src="composeApp.js"></script>
</head>
<body>
    <div id="loading" class="loader">
        <div class="spinner"></div>
        <div style="font-size: 18px; font-weight: 500; letter-spacing: 0.5px;">Loading FoodSnap AI...</div>
    </div>
    <canvas id="compose-canvas"></canvas>
</body>
</html>
