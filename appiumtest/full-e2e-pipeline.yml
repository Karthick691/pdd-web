name: FoodSnap AI — E2E & Security Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-verification-suite:
    name: Run Verification Dashboard Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Run Web E2E Test Suite (Selenium)
        run: |
          python appiumtest/run_e2e_tests.py

      - name: Run Mobile E2E Test Suite (Appium)
        run: |
          python appiumtest/run_appium_tests.py

      - name: Run Mobile Load Test Suite (Performance)
        run: |
          python appiumtest/run_load_tests.py

      - name: Run Backend Security Audit (Vulnerabilities)
        run: |
          python appiumtest/run_security_tests.py

      - name: Publish Step Summary Dashboard
        run: |
          python appiumtest/publish_results.py

      - name: Upload Web E2E Artifact Report
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: appiumtest/E2E_Automation_Test_Results.xlsx

      - name: Upload Appium Mobile E2E Artifact Report
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-report
          path: appiumtest/Android_Appium_Test_Results.xlsx

      - name: Upload Mobile Load Test Artifact Report
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: appiumtest/load_test.xlsx

      - name: Upload Backend Security Artifact Report
        uses: actions/upload-artifact@v4
        with:
          name: security-test-report
          path: appiumtest/Security_Test_Results.csv
