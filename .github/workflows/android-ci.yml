name: Android and Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-ci:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x android/backend/gradlew

      - name: Build & Run Tests
        working-directory: android/backend
        run: ./gradlew build --no-daemon

  frontend-ci:
    name: Build & Package Frontend (Android & WasmJS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x android/frontend/gradlew

      - name: Build Android Debug APK
        working-directory: android/frontend
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Web WasmJS distribution
        working-directory: android/frontend
        run: ./gradlew wasmJsBrowserDistribution --no-daemon

      - name: Upload Android Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: composeApp-debug-apk
          path: android/frontend/composeApp/build/outputs/apk/debug/composeApp-debug.apk
