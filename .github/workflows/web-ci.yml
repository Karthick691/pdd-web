name: Web and AI Service CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend-ci:
    name: Build React Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: FoodSnapNutritionAI/package-lock.json

      - name: Install Dependencies
        working-directory: FoodSnapNutritionAI
        run: npm ci

      - name: Build Project
        working-directory: FoodSnapNutritionAI
        run: npm run build

  ai-service-ci:
    name: Build AI Service (Docker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          file: ./ai-service/Dockerfile
          push: false
          tags: ai-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
